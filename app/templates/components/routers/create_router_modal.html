<dialog id="createRouter" class="modal">

    <div class="modal-header">
        <h3>Criar Novo Router</h3>
    </div>

    <form method="POST" action="/routers/create" class="modal-form">

        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>IP Address</label>
            <input type="text" name="ip_address" required>
        </div>

        <div class="form-group">
            <label>API Port</label>
            <input type="number" name="api_port" value="8728">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password">
        </div>

        <div class="form-group">
            <label>Localização</label>
            <input type="text" name="location" placeholder="Ex: Sala do rack">
        </div>

        <div class="form-group">
            <label>Empresa</label>
            <select name="tenant_id" required>

                {% for tenant in tenants %}
                <option value="{{ tenant.id }}">
                    {{ tenant.name }}
                </option>
                {% endfor %}

            </select>
        </div>

        <div class="modal-footer">

            <button type="button"
                    class="button secondary"
                    onclick="document.getElementById('createRouter').close()">
                Cancelar
            </button>

            <button type="submit"
                    class="button primary">
                Cadastrar Router
            </button>

        </div>

    </form>

</dialog>
