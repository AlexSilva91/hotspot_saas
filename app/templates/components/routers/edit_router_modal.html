<dialog id="editRouter_{{ router.id }}" class="modal">

    <div class="modal-header">
        <h3>Editar Router</h3>
    </div>

    <form method="POST"
          action="/routers/{{ router.id }}/edit"
          class="modal-form">

        <div class="form-group">
            <label>Nome</label>
            <input type="text"
                   name="name"
                   value="{{ router.name }}"
                   required>
        </div>

        <div class="form-group">
            <label>IP Address</label>
            <input type="text"
                   name="ip_address"
                   value="{{ router.ip_address }}"
                   required>
        </div>

        <div class="form-group">
            <label>API Port</label>
            <input type="number"
                   name="api_port"
                   value="{{ router.api_port }}">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   name="username"
                   value="{{ router.username }}">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Deixe em branco para manter a atual">
        </div>

        <div class="form-group">
            <label>Localização</label>
            <input type="text"
                   name="location"
                   value="{{ router.location }}">
        </div>

        <div class="form-group">
            <label>Empresa</label>

            <select name="tenant_id">

                {% for tenant in tenants %}
                <option value="{{ tenant.id }}"
                    {% if router.tenant_id == tenant.id %}selected{% endif %}>
                    {{ tenant.name }}
                </option>
                {% endfor %}

            </select>

        </div>

        <div class="modal-footer">

            <button type="button"
                    class="button secondary"
                    onclick="document.getElementById('editRouter_{{ router.id }}').close()">
                Cancelar
            </button>

            <button type="submit"
                    class="button primary">
                Salvar
            </button>

        </div>

    </form>

</dialog>
