<dialog id="editUser_{{ user.id }}" class="modal">

    <div class="modal-header">
        <h3>Editar Usuário</h3>
    </div>

    <form method="POST"
          action="/users/{{ user.id }}/edit"
          class="modal-form">

        <div class="form-group">

            <label>E-mail</label>

            <input type="email"
                   name="email"
                   value="{{ user.email }}"
                   required>

        </div>


        <div class="form-group">

            <label>Nova senha</label>

            <input type="password"
                   name="password">

            <small>
                Deixe em branco para manter a atual
            </small>

        </div>


        <div class="form-group">
        <label>Permissão</label>
        <select name="role">
            {% set current_role = current_user.role.name %}
            {% set selected_role = form_data.role if form_data.role is defined else '' %}

            {% if current_role in ['ADMIN', 'MANAGER'] %}
                <option value="ADMIN" {% if selected_role == 'ADMIN' %}selected{% endif %}>Admin</option>
                <option value="MANAGER" {% if selected_role == 'MANAGER' %}selected{% endif %}>Manager</option>
            {% endif %}

            <option value="USER" {% if selected_role == 'USER' %}selected{% endif %}>User</option>
            <option value="VIEWER" {% if selected_role == 'VIEWER' %}selected{% endif %}>Viewer</option>
        </select>
    </div>


        <div class="form-group">

            <label>Empresa</label>

            <select name="tenant_id">

                <option value="">Sem empresa</option>

                {% for tenant in tenants %}

                    <option value="{{ tenant.id }}"
                            {% if user.tenant_id == tenant.id %}selected{% endif %}>
                        {{ tenant.name }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <div class="form-group">

            <label>Status</label>

            <select name="active">

                <option value="true"
                        {% if user.active %}selected{% endif %}>
                    Ativo
                </option>

                <option value="false"
                        {% if not user.active %}selected{% endif %}>
                    Inativo
                </option>

            </select>

        </div>


        <div class="modal-footer">

            <button type="button"
                    class="button secondary"
                    onclick="document.getElementById('editUser_{{ user.id }}').close()">
                Cancelar
            </button>

            <button type="submit"
                    class="button primary">
                Salvar
            </button>

        </div>

    </form>

</dialog>
