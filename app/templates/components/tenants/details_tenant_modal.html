<dialog id="tenant_{{ tenant.id }}" class="modal">

    <div class="modal-header">
        <h3>Detalhes da Empresa</h3>
    </div>

    <div class="modal-body">

        <div class="detail-item">
            <span class="detail-label">Nome:</span>
            <span class="detail-value">
                {{ tenant.name }}
            </span>
        </div>

        <div class="detail-item">
            <span class="detail-label">Plano:</span>
            <span class="detail-value">
                {% if tenant.plan %}
                    {{ tenant.plan.name }}
                {% else %}
                    Sem plano
                {% endif %}
            </span>
        </div>

        <div class="detail-item">
            <span class="detail-label">Status:</span>
            <span class="detail-value">
                {% if tenant.active %}
                    Ativo
                {% else %}
                    Inativo
                {% endif %}
            </span>
        </div>

        <div class="detail-item">
            <span class="detail-label">Criado em:</span>
            <span class="detail-value">
                {{ tenant.created_at.strftime('%d/%m/%Y às %H:%M') if tenant.created_at }}
            </span>
        </div>

    </div>

    <div class="modal-footer">
        <button class="button primary"
                onclick="document.getElementById('tenant_{{ tenant.id }}').close()">
            Fechar
        </button>
    </div>

</dialog>
