<dialog id="edit_{{ plan.id }}">

<h3>Editar Plano: {{ plan.name }}</h3>

<form method="POST" action="/plans/{{ plan.id }}/edit">

<label>Nome</label>
<input type="text" name="name" value="{{ plan.name }}" required>

<label>Máx. Roteadores</label>
<input type="number" name="max_routers" value="{{ plan.max_routers }}" required>

<label>Máx. Usuários</label>
<input type="number" name="max_users" value="{{ plan.max_users }}" required>

<br><br>

<button type="submit">Salvar</button>

</form>

<br>

<button onclick="document.getElementById('edit_{{ plan.id }}').close()">
Cancelar
</button>

</dialog>
